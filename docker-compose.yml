version: "3.9"

services:

  user-service:
    build: ./services/user-service
    container_name: user-service
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/users_db
    networks:
      - cloudcart-network
  
  product-service:
    build: ./services/product-service
    container_name: product-service
    ports:
      - "3000:3000"
    depends_on:
      - redis
    networks:
      - cloudcart-network

  order-service:
    build: ./services/order-service
    container_name: order-service
    ports:
      - "8001:8001"
    depends_on:
      - redis
    networks:
      - cloudcart-network    
  
  notification-service:
    build: ./services/notification-service
    container_name: notification-service
    depends_on:
      - redis
    networks:
      - cloudcart-network

  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_DB: users_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cloudcart-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - cloudcart-network

  api-gateway:
    image: nginx:alpine
    container_name: api-gateway
    ports:
      - "8080:80"
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - user-service
      - product-service
    networks:
      - cloudcart-network    

volumes:
  postgres_data:

networks:
  cloudcart-network: