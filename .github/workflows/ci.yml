name: CloudCart CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build User Service
        run: |
          docker build -t cloudcart-user-service ./services/user-service

      - name: Build Product Service
        run: |
          docker build -t cloudcart-product-service ./services/product-service

      - name: Build Order Service
        run: |
          docker build -t cloudcart-order-service ./services/order-service

      - name: Build Notification Service
        run: |
          docker build -t cloudcart-notification-service ./services/notification-service

      - name: Scan User Service
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: cloudcart-user-service

      - name: Scan Product Service
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: cloudcart-product-service

      - name: Scan Order Service
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: cloudcart-order-service

      - name: Scan Notification Service
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: cloudcart-notification-service
